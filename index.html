<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 举重专业裁判系统</title>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        :root { --blue: #00f2ff; --pink: #ff00ff; --yellow: #f3ea5f; }
        body { background: #05050a; color: var(--blue); font-family: 'Courier New', Courier, monospace; margin: 0; text-align: center; }
        .header { padding: 15px; background: #111; border-bottom: 2px solid var(--pink); font-size: 1.2rem; letter-spacing: 2px; }
        
        /* 视频与分析层 */
        #display-area { position: relative; width: 100%; max-width: 640px; margin: auto; background: #000; border: 1px solid var(--blue); }
        canvas { width: 100%; height: auto; display: block; }
        video { display: none; }

        /* 实时数据面板 */
        .info-bar { background: rgba(0,0,0,0.8); padding: 10px; display: flex; justify-content: space-around; font-size: 0.9rem; border-bottom: 1px solid #333; }
        .status-msg { font-size: 1.1rem; color: var(--yellow); margin: 15px 0; font-weight: bold; min-height: 1.5em; }

        /* 裁判灯 */
        .lights { display: flex; justify-content: center; gap: 20px; margin: 10px 0; }
        .light { width: 50px; height: 50px; border: 2px solid #333; border-radius: 4px; transition: 0.3s; }
        .white-light { background: #fff; box-shadow: 0 0 30px #fff; }
        .red-light { background: var(--pink); box-shadow: 0 0 30px var(--pink); }

        /* 最终结论弹窗 */
        #result-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; background: rgba(0,0,0,0.9); border: 3px solid var(--blue);
            display: none; z-index: 100; font-size: 2rem; font-weight: bold;
        }

        /* 按钮控制 */
        .controls { padding: 20px; display: flex; flex-direction: column; gap: 12px; max-width: 400px; margin: auto; }
        .btn { background: #0a0a15; border: 1px solid var(--blue); color: var(--blue); padding: 16px; font-size: 1rem; cursor: pointer; border-radius: 4px; }
        .btn:active { background: var(--blue); color: #000; }
        .btn-upload { background: #1a1a30; border-color: var(--pink); color: #fff; }
    </style>
</head>
<body>

<div class="header">SYSTEM: JUDGE-AI v1.5</div>

<div id="display-area">
    <video id="input_video" playsinline muted crossorigin="anonymous"></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
    <div id="result-overlay">判定中...</div>
</div>

<div class="info-bar">
    <span id="deg-l">L: --°</span>
    <span id="deg-r">R: --°</span>
    <span id="min-angle">最小肘角: --°</span>
</div>

<div class="status-msg" id="status-msg">等待输入源...</div>

<div class="lights">
    <div id="l1" class="light"></div><div id="l2" class="light"></div><div id="l3" class="light"></div>
</div>

<div class="controls">
    <button class="btn" onclick="startLive()">1. 开启实时监测 (后置镜头)</button>
    <label class="btn btn-upload">
        2. 导入视频并自动分析结论
        <input type="file" id="file-input" accept="video/*" style="display:none">
    </label>
</div>

<script type="module">
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const statusMsg = document.getElementById('status-msg');
    const overlay = document.getElementById('result-overlay');
    const lights = [document.getElementById('l1'), document.getElementById('l2'), document.getElementById('l3')];

    let minAngleObserved = 180; // 记录视频全过程中的最小肘部角度
    let isAnalyzing = false;
    let hasFault = false; // 是否发生过补推

    function getAngle(a, b, c) {
        let ang = Math.abs(Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x)) * 180 / Math.PI;
        return ang > 180 ? 360 - ang : ang;
    }

    function onResults(results) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.poseLandmarks) {
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00f2ff', lineWidth: 2});
            drawLandmarks(ctx, results.poseLandmarks, {color: '#ff00ff', lineWidth: 1, radius: 2});

            const lm = results.poseLandmarks;
            const lA = getAngle(lm[11], lm[13], lm[15]);
            const rA = getAngle(lm[12], lm[14], lm[16]);
            const currentMin = Math.min(lA, rA);

            document.getElementById('deg-l').innerText = `L: ${Math.round(lA)}°`;
            document.getElementById('deg-r').innerText = `R: ${Math.round(rA)}°`;

            // 判罚逻辑：手腕高于肩膀（支撑瞬间）
            const isOverhead = (lm[15].y < lm[11].y) && (lm[16].y < lm[12].y);
            if (isOverhead) {
                if (currentMin < minAngleObserved) minAngleObserved = currentMin;
                document.getElementById('min-angle').innerText = `最小肘角: ${Math.round(minAngleObserved)}°`;

                if (currentMin < 158) {
                    hasFault = true;
                    statusMsg.innerText = "⚠️ 检测到补推风险！";
                    lights.forEach(l => l.className = 'light red-light');
                } else {
                    statusMsg.innerText = "支撑稳健分析中...";
                    lights.forEach(l => l.className = 'light white-light');
                }
            }
        }
        ctx.restore();
    }

    const pose = new Pose({ locateFile: (file) => `https://fastly.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onResults);

    // 实时摄像头
    window.startLive = async () => {
        resetSystem();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.onloadedmetadata = () => { video.play(); runEngine(); };
        } catch (e) { alert("摄像头开启失败，请检查HTTPS环境"); }
    };

    // 导入视频分析
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        resetSystem();
        statusMsg.innerText = "正在加载视频文件...";
        video.srcObject = null;
        video.src = URL.createObjectURL(file);
        
        video.onloadedmetadata = () => {
            statusMsg.innerText = "AI 正在逐帧分析视频...";
            video.play();
            runEngine();
        };

        // 视频播放结束时得出结论
        video.onended = () => {
            showFinalResult();
        };
    };

    function resetSystem() {
        minAngleObserved = 180;
        hasFault = false;
        overlay.style.display = 'none';
        lights.forEach(l => l.className = 'light');
        document.getElementById('min-angle').innerText = "最小肘角: --°";
    }

    function showFinalResult() {
        overlay.style.display = 'block';
        if (hasFault || minAngleObserved < 158) {
            overlay.innerText = "NO LIFT 🔴";
            overlay.style.borderColor = "#ff00ff";
            overlay.style.color = "#ff00ff";
            statusMsg.innerText = "判定结束：动作失败 (补推)";
        } else {
            overlay.innerText = "GOOD LIFT ⚪";
            overlay.style.borderColor = "#fff";
            overlay.style.color = "#fff";
            statusMsg.innerText = "判定结束：动作成功";
        }
    }

    async function runEngine() {
        if (video.paused || video.ended) return;
        await pose.send({ image: video });
        requestAnimationFrame(runEngine);
    }
</script>

</body>
</html>
