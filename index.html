<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-JUDGE AI 举重裁判</title>
    <!-- 核心 AI 库 -->
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; }
        body { background: #0a0a0f; color: var(--neon-blue); font-family: monospace; margin: 0; text-align: center; overflow-x: hidden; }
        .header { padding: 15px; font-size: 1.2rem; text-shadow: 0 0 10px var(--neon-blue); border-bottom: 2px solid var(--neon-pink); }
        
        /* 视频容器 */
        #container { position: relative; width: 95%; max-width: 640px; margin: 10px auto; background: #000; border: 2px solid var(--neon-blue); line-height: 0; }
        canvas { width: 100%; height: auto; }
        video { display: none; }

        /* 裁判面板 */
        .judge-panel { background: rgba(20, 20, 30, 0.9); padding: 15px; margin: 10px auto; width: 90%; max-width: 600px; border-left: 5px solid var(--neon-pink); }
        .lights { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .light { width: 50px; height: 50px; background: #111; border: 1px solid #444; transition: 0.3s; }
        .white-light { background: #fff; box-shadow: 0 0 30px #fff; }
        .red-light { background: var(--neon-pink); box-shadow: 0 0 30px var(--neon-pink); }
        
        #status-text { color: #f3ea5f; font-size: 1.1rem; margin: 10px 0; min-height: 1.5em; font-weight: bold; }
        .data-info { display: flex; justify-content: space-around; font-size: 0.8rem; border-top: 1px solid #333; padding-top: 10px; }

        /* 按钮 */
        .btn-group { display: flex; flex-direction: column; gap: 10px; padding: 20px; max-width: 400px; margin: 0 auto; }
        .cyber-btn { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 15px; font-size: 1rem; cursor: pointer; text-transform: uppercase; }
        .cyber-btn:active { background: var(--neon-blue); color: #000; }
        .file-label { background: #1a1a1a; border: 1px dashed var(--neon-blue); padding: 10px; display: block; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">CYBER-JUDGE v1.2</div>

<div id="container">
    <video id="input_video" playsinline muted loop></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
</div>

<div class="judge-panel">
    <div class="lights">
        <div id="l1" class="light"></div>
        <div id="l2" class="light"></div>
        <div id="l3" class="light"></div>
    </div>
    <div id="status-text">系统就绪，请选择输入源</div>
    <div class="data-info">
        <span id="angle-l">左肘: --°</span>
        <span id="angle-r">右肘: --°</span>
    </div>
</div>

<div class="btn-group">
    <button class="cyber-btn" onclick="startLiveCamera()">① 开启摄像头实时判罚</button>
    <label class="file-label" for="file-upload">
        ② 从相册选择视频分析
        <input type="file" id="file-upload" accept="video/*" style="display:none">
    </label>
</div>

<script type="module">
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status-text');
    const angleLText = document.getElementById('angle-l');
    const angleRText = document.getElementById('angle-r');
    const lights = [document.getElementById('l1'), document.getElementById('l2'), document.getElementById('l3')];

    // 计算角度函数
    function getAngle(a, b, c) {
        let ang = Math.abs(Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x)) * 180 / Math.PI;
        return ang > 180 ? 360 - ang : ang;
    }

    // 处理判罚结果
    function onResults(results) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.poseLandmarks) {
            // 绘制骨架
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00f2ff', lineWidth: 2});
            drawLandmarks(ctx, results.poseLandmarks, {color: '#ff00ff', lineWidth: 1, radius: 2});

            const lm = results.poseLandmarks;
            const lAngle = getAngle(lm[11], lm[13], lm[15]);
            const rAngle = getAngle(lm[12], lm[14], lm[16]);

            angleLText.innerText = `左肘: ${Math.round(lAngle)}°`;
            angleRText.innerText = `右肘: ${Math.round(rAngle)}°`;

            // 判罚逻辑：手腕高于肩膀 且 肘部夹角小于 158 度判定为补推
            const isOverhead = (lm[15].y < lm[11].y) && (lm[16].y < lm[12].y);
            
            if (isOverhead) {
                if (lAngle < 155 || rAngle < 155) {
                    statusText.innerText = "❌ 红灯: 检测到补推 (PRESS-OUT)";
                    lights.forEach(l => l.className = 'light red-light');
                } else {
                    statusText.innerText = "✅ 白灯: 成功 (GOOD LIFT)";
                    lights.forEach(l => l.className = 'light white-light');
                }
            } else {
                statusText.innerText = "扫描动作中...";
                lights.forEach(l => l.className = 'light');
            }
        }
        ctx.restore();
    }

    // 初始化 MediaPipe Pose
    const pose = new Pose({
        locateFile: (file) => `https://fastly.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onResults);

    // 1. 摄像头启动逻辑
    window.startLiveCamera = () => {
        statusText.innerText = "正在请求摄像头...";
        const camera = new Camera(video, {
            onFrame: async () => { await pose.send({image: video}); },
            width: 640, height: 480
        });
        camera.start().catch(err => {
            alert("无法开启摄像头，请检查 HTTPS 协议或 Safari 权限。");
            statusText.innerText = "摄像头开启失败";
        });
    };

    // 2. 相册视频上传与逐帧分析逻辑
    document.getElementById('file-upload').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        statusText.innerText = "视频载入中，请稍后...";
        const url = URL.createObjectURL(file);
        video.src = url;
        video.load();
        
        // 视频播放时逐帧发送给 AI
        video.onplay = () => {
            const processFrame = async () => {
                if (video.paused || video.ended) return;
                await pose.send({image: video});
                requestAnimationFrame(processFrame);
            };
            processFrame();
        };

        // 自动播放视频启动分析
        setTimeout(() => {
            video.play().catch(() => {
                statusText.innerText = "点击画面开始分析视频";
                canvas.onclick = () => video.play();
            });
        }, 500);
    };
</script>

</body>
</html>
