<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 举重裁判旗舰版</title>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        :root { --blue: #00f2ff; --pink: #ff00ff; }
        body { background: #000; color: var(--blue); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; text-align: center; }
        .header { padding: 15px; border-bottom: 2px solid var(--pink); font-weight: bold; }
        
        #container { position: relative; width: 100%; max-width: 640px; margin: auto; background: #111; overflow: hidden; }
        /* 强制取消所有镜像翻转 */
        canvas, video { width: 100% !important; height: auto !important; transform: none !important; }
        video { display: none; }

        .judge-ui { background: rgba(20,20,30,0.95); padding: 15px; border-top: 2px solid var(--blue); }
        .lights { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .light { width: 55px; height: 55px; border: 2px solid #333; border-radius: 4px; }
        .white-light { background: #fff; box-shadow: 0 0 30px #fff; border-color: #fff; }
        .red-light { background: var(--pink); box-shadow: 0 0 30px var(--pink); border-color: var(--pink); }
        
        #status { font-size: 1.2rem; color: #f3ea5f; margin: 10px 0; font-weight: bold; min-height: 1.5em; }
        .angle-data { display: flex; justify-content: space-around; font-size: 0.9rem; margin-top: 10px; font-family: monospace; }
        
        .controls { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .btn { background: #1a1a1a; border: 1px solid var(--blue); color: var(--blue); padding: 16px; font-size: 1rem; border-radius: 8px; cursor: pointer; }
        .btn:active { background: var(--blue); color: #000; }
        .btn-file { background: #333; border-style: dashed; }
    </style>
</head>
<body>

<div class="header">CYBER-JUDGE PRO v1.4</div>

<div id="container">
    <video id="input_video" playsinline muted crossorigin="anonymous" webkit-playsinline></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
</div>

<div class="judge-ui">
    <div class="lights">
        <div id="l1" class="light"></div><div id="l2" class="light"></div><div id="l3" class="light"></div>
    </div>
    <div id="status">请初始化输入源</div>
    <div class="angle-data">
        <span id="deg-l">左肘: --°</span><span id="deg-r">右肘: --°</span>
    </div>
</div>

<div class="controls">
    <!-- 尝试后置镜头 -->
    <button class="btn" onclick="openCamera('environment')">开启后置摄像头 (推荐)</button>
    <!-- 如果后置打不开，备用按钮 -->
    <button class="btn" onclick="openCamera('user')" style="font-size: 0.8rem; opacity: 0.6;">切换前置/其他镜头</button>
    
    <label class="btn btn-file">
        从相册导入视频分析
        <input type="file" id="file-input" accept="video/*" style="display:none">
    </label>
</div>

<script type="module">
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status');
    const lights = [document.getElementById('l1'), document.getElementById('l2'), document.getElementById('l3')];

    function calcAngle(a, b, c) {
        let ang = Math.abs(Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x)) * 180 / Math.PI;
        return ang > 180 ? 360 - ang : ang;
    }

    function onResults(results) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.poseLandmarks) {
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00f2ff', lineWidth: 2});
            drawLandmarks(ctx, results.poseLandmarks, {color: '#ff00ff', lineWidth: 1, radius: 2});

            const lm = results.poseLandmarks;
            const lA = calcAngle(lm[11], lm[13], lm[15]);
            const rA = calcAngle(lm[12], lm[14], lm[16]);

            document.getElementById('deg-l').innerText = `左肘: ${Math.round(lA)}°`;
            document.getElementById('deg-r').innerText = `右肘: ${Math.round(rA)}°`;

            // 判罚核心：手腕高度 y 值越小说明越高
            const isOverhead = (lm[15].y < lm[11].y) && (lm[16].y < lm[12].y);
            
            if (isOverhead) {
                if (lA < 158 || rA < 158) {
                    statusText.innerText = "🔴 红灯: 补推 (PRESS-OUT)";
                    lights.forEach(l => l.className = 'light red-light');
                } else {
                    statusText.innerText = "⚪ 白灯: 成功 (GOOD)";
                    lights.forEach(l => l.className = 'light white-light');
                }
            } else {
                statusText.innerText = "扫描动作中...";
                lights.forEach(l => l.className = 'light');
            }
        }
        ctx.restore();
    }

    const pose = new Pose({
        locateFile: (file) => `https://fastly.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onResults);

    // 摄像头逻辑
    window.openCamera = async (mode) => {
        statusText.innerText = "正在请求镜头...";
        if (window.currentStream) {
            window.currentStream.getTracks().forEach(track => track.stop());
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: mode, width: 640, height: 480 }
            });
            window.currentStream = stream;
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                startAI();
            };
        } catch (err) {
            alert("无法开启指定镜头，请尝试另一个按钮或检查权限。");
        }
    };

    // 视频文件逻辑
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        statusText.innerText = "分析视频中...";
        if (window.currentStream) {
            window.currentStream.getTracks().forEach(track => track.stop());
        }
        video.srcObject = null;
        video.src = URL.createObjectURL(file);
        video.onloadedmetadata = () => {
            video.play();
            startAI();
        };
    };

    // 统一 AI 驱动引擎
    async function startAI() {
        if (video.paused || video.ended) return;
        await pose.send({ image: video });
        // 使用 requestAnimationFrame 保证高频率检测
        requestAnimationFrame(startAI);
    }
</script>

</body>
</html>
