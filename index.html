<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <!-- 这行保证手机打开时不会缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CYBER-JUDGE | AI举重裁判</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; }
    body { background: #0a0a0f; color: var(--neon-blue); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
    h1 { text-shadow: 0 0 10px var(--neon-blue); font-size: 1.2rem; margin: 20px 0; border-bottom: 2px solid var(--neon-pink); }
    .main-view { position: relative; width: 95%; max-width: 640px; border: 2px solid var(--neon-blue); background: #000; line-height: 0; }
    canvas { width: 100%; height: auto; }
    .judge-panel { margin-top: 15px; background: rgba(20, 20, 30, 0.8); padding: 15px; width: 90%; max-width: 600px; border-left: 5px solid var(--neon-pink); }
    .lights { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
    .light { width: 40px; height: 40px; border: 1px solid #333; background: #111; }
    .white-light { background: #fff; box-shadow: 0 0 20px #fff; }
    .red-light { background: var(--neon-pink); box-shadow: 0 0 20px var(--neon-pink); }
    #status-text { text-align: center; font-weight: bold; color: #f3ea5f; margin: 10px 0; }
    .cyber-btn { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 10px; width: 100%; margin-top: 10px; cursor: pointer; }
    #input_video { display: none; }
  </style>
</head>
<body>
  <h1>CYBER-JUDGE AI</h1>
  <div class="main-view">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
  </div>
  <div class="judge-panel">
    <div class="lights"><div id="l1" class="light"></div><div id="l2" class="light"></div><div id="l3" class="light"></div></div>
    <div id="status-text">等待系统初始化...</div>
    <button class="cyber-btn" onclick="startCamera()">启动实时监测 (Camera)</button>
    <button class="cyber-btn" onclick="document.getElementById('file-upload').click()">上传视频分析 (Album)</button>
    <input type="file" id="file-upload" style="display:none" accept="video/*">
  </div>

  <script type="module">
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status-text');
    const lights = [document.getElementById('l1'), document.getElementById('l2'), document.getElementById('l3')];

    function calculateAngle(a, b, c) {
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs(radians * 180.0 / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return angle;
    }

    function onResults(results) {
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
      if (results.poseLandmarks) {
        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00f2ff', lineWidth: 2});
        drawLandmarks(ctx, results.poseLandmarks, {color: '#ff00ff', lineWidth: 1, radius: 2});
        const lm = results.poseLandmarks;
        const lAngle = calculateAngle(lm[11], lm[13], lm[15]);
        const rAngle = calculateAngle(lm[12], lm[14], lm[16]);
        const isOverhead = lm[15].y < lm[11].y && lm[16].y < lm[12].y;
        if (isOverhead) {
          if (lAngle < 158 || rAngle < 158) {
            statusText.innerText = "红灯: 检测到补推 (PRESS-OUT)";
            lights.forEach(l => l.className = 'light red-light');
          } else {
            statusText.innerText = "白灯: 支撑稳健 (GOOD)";
            lights.forEach(l => l.className = 'light white-light');
          }
        } else {
          statusText.innerText = "扫描动作中...";
          lights.forEach(l => l.className = 'light');
        }
      }
      ctx.restore();
    }

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onResults);

    window.startCamera = () => {
      statusText.innerText = "正在开启摄像头...";
      const camera = new Camera(video, { onFrame: async () => { await pose.send({image: video}); }, width: 640, height: 480 });
      camera.start();
    };

    document.getElementById('file-upload').onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        video.src = URL.createObjectURL(file);
        video.play();
        const process = async () => {
          if (!video.paused && !video.ended) {
            await pose.send({image: video});
            requestAnimationFrame(process);
          }
        };
        process();
      }
    };
  </script>
</body>
</html>
