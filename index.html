<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 举重裁判-大视频兼容版</title>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { background: #000; color: #00f2ff; font-family: sans-serif; margin: 0; text-align: center; }
        #container { position: relative; width: 100%; max-width: 500px; margin: auto; background: #111; min-height: 300px; }
        canvas { width: 100%; height: auto; display: block; }
        video { display: none; }
        .ui-box { padding: 15px; background: #111; border-top: 1px solid #333; }
        .status { color: #f3ea5f; font-weight: bold; margin: 10px; font-size: 1.1rem; }
        .btn { background: #00f2ff; color: #000; border: none; padding: 15px; width: 80%; border-radius: 10px; font-weight: bold; margin: 10px 0; font-size: 1rem; }
        #result { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 3px solid #ff00ff; padding: 20px; font-size: 2rem; display: none; z-index: 100; width: 70%; }
    </style>
</head>
<body>

<div style="padding:10px; background:#222;">AI JUDGE v1.7 (Stable)</div>

<div id="container">
    <video id="input_video" playsinline muted webkit-playsinline></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
    <div id="result">判定中...</div>
</div>

<div class="ui-box">
    <div id="status" class="status">等待导入视频...</div>
    <div id="data" style="font-size:0.8rem;">最小肘角记录: --°</div>
    
    <button class="btn" onclick="startCam()">开启实时监测</button>
    
    <label style="display:block;">
        <div class="btn" style="background:#ff00ff; color:#fff; margin:auto;">选择相册视频分析</div>
        <input type="file" id="file_up" accept="video/*" style="display:none">
    </label>
</div>

<script type="module">
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const resultBox = document.getElementById('result');

    let minAngle = 180;
    let hasFault = false;

    // 1. 初始化 AI (使用最低功耗模式以兼容大视频)
    const pose = new Pose({ locateFile: (file) => `https://fastly.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(results => {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        if (results.poseLandmarks) {
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00f2ff', lineWidth: 2});
            const lm = results.poseLandmarks;
            const lA = calcAngle(lm[11], lm[13], lm[15]);
            const rA = calcAngle(lm[12], lm[14], lm[16]);
            const curMin = Math.min(lA, rA);
            
            // 判罚逻辑：手腕高于肩膀
            if (lm[15].y < lm[11].y && lm[16].y < lm[12].y) {
                if (curMin < minAngle) minAngle = curMin;
                document.getElementById('data').innerText = `当前最小肘角: ${Math.round(minAngle)}°`;
                if (curMin < 158) hasFault = true;
            }
        }
        ctx.restore();
    });

    function calcAngle(a, b, c) {
        let ang = Math.abs(Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x)) * 180 / Math.PI;
        return ang > 180 ? 360 - ang : ang;
    }

    // 2. 视频处理逻辑
    document.getElementById('file_up').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // 重置状态
        minAngle = 180; hasFault = false;
        resultBox.style.display = 'none';
        
        status.innerText = "视频加载中，请点击屏幕开始...";
        video.src = URL.createObjectURL(file);
        
        // 关键修复：点击屏幕强制播放（解决移动端拦截）
        canvas.onclick = () => {
            video.play();
            status.innerText = "分析中，请勿关闭...";
            process();
        };
    };

    async function process() {
        if (video.paused || video.ended) {
            if (video.ended) showFinal();
            return;
        }
        await pose.send({ image: video });
        requestAnimationFrame(process);
    }

    function showFinal() {
        resultBox.style.display = 'block';
        if (hasFault || minAngle < 158) {
            resultBox.innerHTML = "<span style='color:#ff00ff'>NO LIFT 🔴</span><br><small style='font-size:1rem'>检测到补推</small>";
            status.innerText = "判定结束：动作失败";
        } else {
            resultBox.innerHTML = "<span style='color:#fff'>GOOD LIFT ⚪</span>";
            status.innerText = "判定结束：动作成功";
        }
    }

    window.startCam = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        video.play();
        process();
    };
</script>
</body>
</html>
