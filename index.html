<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 裁判测试版</title>
    <!-- 使用更稳定的 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }
        #v-container { width: 100%; max-width: 500px; margin: auto; border: 2px solid #333; position: relative; }
        video, canvas { width: 100%; height: auto; }
        .btn { padding: 15px; background: #007bff; color: white; border: none; width: 100%; margin: 10px 0; font-size: 16px; border-radius: 5px; }
        #error-log { color: #ff4444; font-size: 14px; margin-top: 10px; border: 1px solid #ff4444; padding: 10px; display: none; }
    </style>
</head>
<body>
    <h3>AI 举重裁判系统</h3>
    <div id="v-container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>
    
    <div id="error-log"></div>

    <button class="btn" onclick="initCamera()">1. 启动摄像头</button>
    <input type="file" id="file-input" accept="video/*" style="display:none">
    <button class="btn" style="background:#28a745" onclick="document.getElementById('file-input').click()">2. 导入相册视频</button>

    <script>
        const video = document.getElementById('input_video');
        const errorLog = document.getElementById('error-log');

        function showError(msg) {
            errorLog.style.display = 'block';
            errorLog.innerText = "错误提示：" + msg;
        }

        // 检查环境是否安全
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            showError("必须使用 HTTPS 网址访问，否则无法开启摄像头！当前协议是: " + location.protocol);
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.play();
                alert("摄像头启动成功！正在加载 AI 模型...");
                // 这里可以继续初始化 Pose 模型...
            } catch (err) {
                showError("无法访问摄像头: " + err.name + " - " + err.message + "\n请检查是否禁用了权限或未使用 Safari 浏览器。");
            }
        }

        document.getElementById('file-input').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                video.src = url;
                video.play();
                alert("视频导入成功！");
            }
        };
    </script>
</body>
</html>
